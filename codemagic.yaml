workflows:
  flutter-apk:
    name: Flutter APK - Guru Matematika
    max_build_duration: 30
    environment:
      flutter: 3.19.0
      java: 17

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build APK release
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
